[build]
  publish = "."

# FinTrack live demo is a client-routed SPA served under /demos/fintrack/.
# Send unknown sub-paths to its index.html so React Router can handle them.
[[redirects]]
  from = "/demos/fintrack/*"
  to = "/demos/fintrack/index.html"
  status = 200

# Daily 60 live demo is an Expo Router SPA (web export) under /demos/daily60/.
# Send unknown sub-paths to its index.html so client-side routing can handle them.
[[redirects]]
  from = "/demos/daily60/*"
  to = "/demos/daily60/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.pdf"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
